<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Medion - Sistem Pencatatan Lembur</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div style="display: flex; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;">
            <div class="spinner"></div>
            <p style="font-weight: 800; color: #64748b; font-size: 0.875rem;">MENGHUBUNGKAN KE CLOUD MEDION...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE (PROJECT: MONITORING-ORDER) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCqhhhn016DjYqZklNK5AhkhN7HTBlGIlg",
            authDomain: "monitoring-order.firebaseapp.com",
            projectId: "monitoring-order",
            storageBucket: "monitoring-order.firebasestorage.app",
            messagingSenderId: "966390784471",
            appId: "1:966390784471:web:58093b205a9fe235392b92",
            measurementId: "G-2VVXTPLQ7Q"
        };

        const appId = 'overtime-medion';

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            window.firebaseUtils = { 
                auth, db, appId, collection, doc, addDoc, updateDoc, 
                deleteDoc, onSnapshot, query, signInAnonymously, onAuthStateChanged 
            };
        } catch (e) {
            window.firebaseError = e.message;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Daftar Pengguna Manual
        const HARDCODED_USERS = [
            { id: "1", name: "Taufik", password: "123456", role: "supervisor" },
            { id: "2", name: "Dixon", password: "123456", role: "technician" },
            { id: "3", name: "Aang", password: "123456", role: "technician" },
            { id: "4", name: "Miraj", password: "123456", role: "technician" }
        ];

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [fbReady, setFbReady] = useState(false);
            const [fbError, setFbError] = useState(null);

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.firebaseUtils) { setFbReady(true); clearInterval(check); }
                    if (window.firebaseError) { setFbError(window.firebaseError); clearInterval(check); }
                }, 500);
                return () => clearInterval(check);
            }, []);

            const [user, setUser] = useState(null); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUserProfile, setCurrentUserProfile] = useState(null); 
            const [loading, setLoading] = useState(true);
            const [dataStatus, setDataStatus] = useState("Menghubungkan...");
            const [entries, setEntries] = useState([]);
            const [view, setView] = useState('dashboard'); 
            const [showForm, setShowForm] = useState(false);
            const [notification, setNotification] = useState(null);
            const [loginData, setLoginData] = useState({ name: '', password: '' });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                technician: '',
                startTime: '',
                endTime: '',
                activity: ''
            });

            // Init Firebase Auth
            useEffect(() => {
                if (!fbReady) return;
                const { auth, signInAnonymously, onAuthStateChanged } = window.firebaseUtils;
                
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } catch (err) { console.error("Auth error:", err); }
                    finally { setLoading(false); }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
                    setUser(firebaseUser);
                    const saved = sessionStorage.getItem('lembur_user');
                    if (saved) {
                        const profile = JSON.parse(saved);
                        setIsLoggedIn(true);
                        setCurrentUserProfile(profile);
                    }
                });
                return () => unsubscribe();
            }, [fbReady]);

            // Real-time Entries Listener
            useEffect(() => {
                if (!user || !fbReady) return;
                const { db, appId, collection, onSnapshot, query } = window.firebaseUtils;
                
                setDataStatus("Memuat riwayat...");
                const entriesRef = collection(db, 'artifacts', appId, 'public', 'data', 'overtime_entries');
                
                const unsub = onSnapshot(query(entriesRef), (snapshot) => {
                    if (snapshot.empty) {
                        setDataStatus("Belum ada data");
                        setEntries([]);
                    } else {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setEntries(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
                        setDataStatus("Sinkron");
                    }
                }, (err) => {
                    console.error("Firestore sync error:", err);
                    setDataStatus("Gagal sinkronisasi");
                });
                return () => unsub();
            }, [user, fbReady]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const found = HARDCODED_USERS.find(u => u.name === loginData.name);
                if (found && found.password === loginData.password) {
                    setIsLoggedIn(true);
                    setCurrentUserProfile(found);
                    sessionStorage.setItem('lembur_user', JSON.stringify(found));
                    notify(`Selamat bekerja, ${found.name}!`);
                } else {
                    notify("Sandi salah!", "error");
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUserProfile(null);
                sessionStorage.removeItem('lembur_user');
                notify("Sesi berakhir", "info");
            };

            const isSupervisor = currentUserProfile?.role === 'supervisor';
            const displayedEntries = useMemo(() => {
                if (!isLoggedIn || !currentUserProfile) return [];
                return isSupervisor ? entries : entries.filter(e => e.technician === currentUserProfile.name);
            }, [isSupervisor, entries, currentUserProfile, isLoggedIn]);

            const totalHours = displayedEntries.reduce((acc, curr) => acc + (curr.duration || 0), 0);
            const totalDays = new Set(displayedEntries.map(e => e.date)).size;

            if (fbError) return (
                <div className="min-h-screen flex items-center justify-center bg-red-50 p-6 text-center">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md border-t-8 border-red-500 text-slate-900">
                        <h2 className="text-2xl font-black mb-4">Gagal Terhubung</h2>
                        <p className="text-slate-500 text-sm mb-6 italic">Cek konfigurasi Firebase Bapak.</p>
                        <div className="bg-slate-100 p-4 rounded-2xl text-[10px] font-mono text-red-500 text-left break-all italic">{fbError}</div>
                    </div>
                </div>
            );

            if (!fbReady || loading) return (
                <div className="min-h-screen flex items-center justify-center flex-col gap-4 text-slate-900">
                    <div className="spinner"></div>
                    <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Sinkronisasi Cloud Medion...</p>
                </div>
            );

            if (!isLoggedIn) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 text-slate-900">
                    <div className="bg-white w-full max-w-md rounded-[3rem] shadow-2xl p-10 animate-in zoom-in-95 duration-300">
                        <div className="text-center mb-10">
                            <div className="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-500/20"><Icon name="clock" className="text-white w-10 h-10" /></div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tight italic">MEDION</h1>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Sistem Lembur Cloud</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div className="relative">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 ml-1">Nama Pengguna</label>
                                <select className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-600 appearance-none transition-all shadow-sm" value={loginData.name} onChange={e => setLoginData({...loginData, name: e.target.value})} required>
                                    <option value="">-- Pilih Nama --</option>
                                    {HARDCODED_USERS.map(u => <option key={u.id} value={u.name}>{u.name} ({u.role === 'supervisor' ? 'Pengawas' : 'Teknisi'})</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 ml-1">Kata Sandi</label>
                                <input type="password" placeholder="••••••••" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-sm" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} required />
                            </div>
                            <button type="submit" className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-500/20 hover:bg-blue-700 transition-all active:scale-95 uppercase tracking-widest text-xs">MASUK SISTEM</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-20 font-sans">
                    <header className="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-20 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-black italic uppercase"><Icon name="clock" className="w-5 h-5 text-white" /> Medion</div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowForm(true)} className="bg-white text-blue-600 px-5 py-2 rounded-full font-black text-[10px] uppercase shadow-sm active:scale-95 transition-all">Catat Lembur</button>
                            <button onClick={handleLogout} className="p-2 hover:bg-white/10 rounded-full transition-colors"><Icon name="log-out" className="w-5 h-5 text-white" /></button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4">
                        <div className="flex justify-between items-center mb-8">
                            <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sesi Aktif</p><h2 className="text-3xl font-black text-slate-800 tracking-tight">{currentUserProfile.name}</h2></div>
                            <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <button onClick={() => setView('dashboard')} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all ${view === 'dashboard' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' : 'text-slate-400 hover:text-slate-600'}`}>DASHBOARD</button>
                                <button onClick={() => setView('list')} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all ${view === 'list' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' : 'text-slate-400 hover:text-slate-600'}`}>RIWAYAT</button>
                            </div>
                        </div>

                        {view === 'dashboard' ? (
                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 p-8 opacity-[0.03] group-hover:scale-110 transition-transform"><Icon name="clock" className="w-20 h-20" /></div>
                                        <span className="text-[9px] font-black text-slate-300 uppercase block mb-1 tracking-widest">{isSupervisor ? 'TOTAL SELURUH TIM' : 'TOTAL JAM ANDA'}</span>
                                        <p className="text-5xl font-black text-slate-800 tracking-tighter">{totalHours} <span className="text-sm font-normal text-slate-300 italic">Jam</span></p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 p-8 opacity-[0.03] group-hover:scale-110 transition-transform"><Icon name="calendar" className="w-20 h-20" /></div>
                                        <span className="text-[9px] font-black text-slate-300 uppercase block mb-1 tracking-widest">HARI KERJA</span>
                                        <p className="text-5xl font-black text-slate-800 tracking-tighter">{totalDays} <span className="text-sm font-normal text-slate-300 italic">Hari</span></p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden text-slate-900">
                                    <div className="p-5 border-b border-slate-50 bg-slate-50/50 text-[9px] font-black uppercase text-slate-400 flex items-center justify-between tracking-widest">
                                        <div className="flex items-center gap-2"><Icon name="list" className="w-3 h-3 text-blue-600" /> Aktivitas Cloud Terbaru</div>
                                        <span className="text-[8px] opacity-60 italic">{dataStatus}</span>
                                    </div>
                                    <div className="divide-y divide-slate-50">
                                        {displayedEntries.length === 0 ? (
                                            <div className="p-16 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest italic opacity-50">Belum ada catatan di database</div>
                                        ) : (
                                            displayedEntries.slice(0, 8).map(entry => (
                                                <div key={entry.id} className="p-5 flex items-center justify-between hover:bg-slate-50/50 transition-all">
                                                    <div className="flex gap-4 items-center min-w-0">
                                                        <div className="bg-slate-50 w-12 h-12 rounded-2xl flex flex-col items-center justify-center text-slate-400 border border-slate-100 shadow-sm">
                                                            <span className="text-lg font-black text-slate-700 leading-none">{new Date(entry.date).getDate()}</span>
                                                            <span className="text-[8px] font-black uppercase leading-none">{new Date(entry.date).toLocaleString('id-ID', { month: 'short' })}</span>
                                                        </div>
                                                        <div className="min-w-0">
                                                            <div className="flex items-center gap-1.5 mb-0.5 flex-wrap">
                                                                {isSupervisor && <span className="text-[7px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded-lg font-black uppercase tracking-tight">{entry.technician}</span>}
                                                                <p className="font-black text-slate-800 text-sm tracking-tighter truncate">{entry.activity}</p>
                                                                <span className={`text-[7px] px-2 py-1 rounded-full font-black uppercase shadow-sm ${entry.status === 'Diajukan' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-slate-100 text-slate-400 border border-slate-200'}`}>
                                                                    {entry.status === 'Diajukan' ? <Icon name="check-circle" className="w-2.5 h-2.5" /> : null} {entry.status}
                                                                </span>
                                                            </div>
                                                            <p className="text-[10px] text-slate-400 font-medium italic">{entry.startTime} - {entry.endTime} ({entry.duration} jam)</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-1.5 shrink-0 ml-2">
                                                        {isSupervisor && entry.status === 'Draft' && (
                                                            <button onClick={async () => { 
                                                                try {
                                                                    await updateDoc(doc(window.firebaseUtils.db, 'artifacts', window.firebaseUtils.appId, 'public', 'data', 'overtime_entries', entry.id), { status: 'Diajukan' }); 
                                                                    notify("Berhasil diajukan!"); 
                                                                } catch(e) { notify("Gagal update", "error"); }
                                                            }} className="bg-emerald-500 text-white p-2.5 rounded-xl shadow-lg active:scale-90 transition-all"><Icon name="send" className="w-3.5 h-3.5 text-white" /></button>
                                                        )}
                                                        <button onClick={async () => { 
                                                            if(confirm("Hapus data dari cloud Medion?")) { 
                                                                try {
                                                                    await deleteDoc(doc(window.firebaseUtils.db, 'artifacts', window.firebaseUtils.appId, 'public', 'data', 'overtime_entries', entry.id)); 
                                                                    notify("Dihapus!", "info"); 
                                                                } catch(e) { notify("Gagal hapus", "error"); }
                                                            } 
                                                        }} className="text-slate-200 hover:text-red-500 p-2.5 transition-colors active:scale-90"><Icon name="trash-2" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                </div>
                                            )
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden text-xs text-slate-900 animate-in fade-in duration-500">
                                <div className="p-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center text-slate-900">
                                    <h2 className="font-black text-slate-800 text-[10px] uppercase tracking-widest italic">Riwayat Cloud Medion</h2>
                                    <div className="flex items-center gap-2">
                                        <span className="text-[8px] opacity-40 italic">{dataStatus}</span>
                                        <span className="bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-black text-[8px] uppercase tracking-tighter">{displayedEntries.length} DATA</span>
                                    </div>
                                </div>
                                <div className="overflow-x-auto"><table className="w-full text-left min-w-[500px]"><thead className="bg-slate-50/50 text-slate-400 text-[8px] font-black uppercase tracking-widest"><tr><th className="px-8 py-5">Tanggal</th>{isSupervisor && <th className="px-8 py-5">Teknisi</th>}<th className="px-8 py-5">Pekerjaan</th><th className="px-8 py-5 text-center">Durasi</th><th className="px-8 py-5 text-center">Status</th><th className="px-8 py-5 w-24"></th></tr></thead><tbody className="divide-y divide-slate-50">{displayedEntries.length === 0 ? (<tr><td colSpan={6} className="px-8 py-10 text-center opacity-30 font-bold uppercase tracking-widest italic">Belum ada riwayat</td></tr>) : displayedEntries.map(entry => (<tr key={entry.id} className="hover:bg-slate-50 group transition-all"><td className="px-8 py-5 font-bold text-slate-700 whitespace-nowrap">{new Date(entry.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}</td>{isSupervisor && <td className="px-8 py-5 text-[9px] font-black text-blue-600 uppercase tracking-tighter">{entry.technician}</td>}<td className="px-8 py-5 text-slate-500 italic max-w-[200px] truncate">{entry.activity}</td><td className="px-8 py-5 text-center font-black text-slate-800">{entry.duration}h</td><td className="px-8 py-5 text-center"><span className={`text-[8px] px-2 py-1 rounded-full font-black uppercase tracking-tight ${entry.status === 'Diajukan' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-slate-100 text-slate-400 border border-slate-200'}`}>{entry.status}</span></td><td className="px-8 py-5 text-right whitespace-nowrap opacity-0 group-hover:opacity-100 transition-all"><button onClick={async () => { if(confirm("Hapus data?")) { try { await deleteDoc(doc(window.firebaseUtils.db, 'artifacts', window.firebaseUtils.appId, 'public', 'data', 'overtime_entries', entry.id)); notify("Dihapus!", "info"); } catch(e) { notify("Gagal", "error"); } } }} className="text-red-400 p-2"><Icon name="trash-2" className="w-3.5 h-3.5" /></button></td></tr>))}</tbody></table></div>
                            </div>
                        )}
                    </main>

                    {showForm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 text-slate-900">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100 text-slate-900 animate-in zoom-in-95 duration-200">
                                <div className="bg-blue-600 p-8 text-white relative">
                                    <div className="flex justify-between items-start"><h3 className="text-xl font-black tracking-tight text-white italic uppercase">Catat Lembur</h3><button onClick={() => setShowForm(false)} className="active:scale-90 text-white"><Icon name="plus" className="w-7 h-7 rotate-45 text-white" /></button></div>
                                    <p className="text-blue-100 text-[9px] font-black uppercase tracking-widest mt-1 opacity-70 italic text-white">Database Cloud Medion</p>
                                </div>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const { db, appId, collection, addDoc } = window.firebaseUtils;
                                    const techName = isSupervisor ? formData.technician : currentUserProfile.name;
                                    
                                    if (!techName) { notify("Pilih teknisi!", "error"); return; }
                                    
                                    const st = new Date(`2000-01-01T${formData.startTime}`);
                                    const et = new Date(`2000-01-01T${formData.endTime}`);
                                    let diff = (et - st) / (1000 * 60 * 60);
                                    if (diff < 0) diff += 24;
                                    const duration = parseFloat(diff.toFixed(2));
                                    
                                    try {
                                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'overtime_entries'), { 
                                            ...formData, 
                                            technician: techName, 
                                            duration, 
                                            status: 'Draft', 
                                            createdAt: new Date().toISOString() 
                                        });
                                        setShowForm(false);
                                        notify("Data tersimpan!");
                                        setFormData(prev => ({...prev, startTime: '', endTime: '', activity: ''}));
                                    } catch(e) {
                                        notify("Gagal simpan ke cloud", "error");
                                    }
                                }} className="p-8 space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Tanggal</label><input type="date" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-600" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} required /></div>
                                        <div><label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Teknisi</label>
                                            {isSupervisor ? (
                                                <select className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-600 appearance-none shadow-sm" value={formData.technician} onChange={e => setFormData({...formData, technician: e.target.value})} required>
                                                    <option value="">-- Pilih --</option>
                                                    {HARDCODED_USERS.filter(u => u.role === 'technician').map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                                </select>
                                            ) : <input type="text" readOnly className="w-full p-4 bg-slate-100 border border-slate-200 rounded-2xl text-xs font-black text-slate-400 outline-none shadow-inner" value={currentUserProfile?.name} />}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Mulai</label><input type="time" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-600 shadow-inner" value={formData.startTime} onChange={e => setFormData({...formData, startTime: e.target.value})} required /></div>
                                        <div><label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Selesai</label><input type="time" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-600 shadow-inner" value={formData.endTime} onChange={e => setFormData({...formData, endTime: e.target.value})} required /></div>
                                    </div>
                                    <div><label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1">Deskripsi Pekerjaan</label><textarea placeholder="Tugas apa yang dikerjakan?" rows="3" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold resize-none outline-none focus:ring-2 focus:ring-blue-600 shadow-inner" value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} required /></div>
                                    <button type="submit" className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-500/30 active:scale-95 transition-all text-white uppercase text-xs tracking-widest">SIMPAN KE CLOUD</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[60] bg-slate-900 text-white px-8 py-4 rounded-full font-black text-[10px] uppercase tracking-widest shadow-2xl animate-in slide-in-from-bottom-8 duration-300">
                            <div className="flex items-center gap-3">
                                <div className={`w-1.5 h-1.5 rounded-full ${notification.type === 'error' ? 'bg-red-500' : 'bg-blue-400'} animate-pulse`}></div>
                                <span>{notification.msg}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
