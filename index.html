<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Mtc LAT - Sistem Pencatatan Lembur</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: #f8fafc;
        }
        .medion-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%);
        }
        .spinner { 
            border: 3px solid rgba(59, 130, 246, 0.1); 
            border-top: 3px solid #2563eb; 
            border-radius: 50%; 
            width: 28px; 
            height: 28px; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root">
        <div style="display: flex; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;">
            <div class="spinner"></div>
            <p style="font-weight: 700; color: #64748b; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;">Menghubungkan Cloud Medion...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- DATA FIREBASE ASLI BAPAK ---
        const firebaseConfig = {
            apiKey: "AIzaSyCqhhhn016DjYqZklNK5AhkhN7HTBlGIlg",
            authDomain: "monitoring-order.firebaseapp.com",
            projectId: "monitoring-order",
            storageBucket: "monitoring-order.firebasestorage.app",
            messagingSenderId: "966390784471",
            appId: "1:966390784471:web:58093b205a9fe235392b92",
            measurementId: "G-2VVXTPLQ7Q"
        };

        const appId = 'overtime-medion';

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            window.firebaseUtils = { auth, db, appId, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, signInAnonymously, onAuthStateChanged };
        } catch (e) {
            window.firebaseError = "Gagal Cloud: " + e.message;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const HARDCODED_USERS = [
            { id: "1", name: "Taufik", password: "indonesia", role: "supervisor" },
            { id: "2", name: "Dixon", password: "ixon", role: "technician" },
            { id: "3", name: "Aang", password: "indah", role: "technician" },
            { id: "4", name: "Miraj", password: "putri", role: "technician" }
        ];

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [fbReady, setFbReady] = useState(false);
            const [fbError, setFbError] = useState(null);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUserProfile, setCurrentUserProfile] = useState(null); 
            const [entries, setEntries] = useState([]);
            const [dataStatus, setDataStatus] = useState("Menghubungkan...");
            const [view, setView] = useState('dashboard'); 
            const [showForm, setShowForm] = useState(false);
            const [notification, setNotification] = useState(null);
            const [loginData, setLoginData] = useState({ name: '', password: '' });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                technician: '',
                startTime: '',
                endTime: '',
                activity: ''
            });

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.firebaseUtils) { setFbReady(true); clearInterval(check); }
                    if (window.firebaseError) { setFbError(window.firebaseError); clearInterval(check); }
                }, 500);
                return () => clearInterval(check);
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const { auth, signInAnonymously, onAuthStateChanged } = window.firebaseUtils;
                
                const initAuth = async () => {
                    try { 
                        await signInAnonymously(auth); 
                        setDataStatus("Cloud Aktif");
                    } catch (err) { 
                        setDataStatus("Eror: Aktifkan Anonymous Sign-in!");
                    } finally { 
                        setLoading(false); 
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
                    setUser(firebaseUser);
                    const saved = sessionStorage.getItem('lembur_user');
                    if (saved) {
                        const profile = JSON.parse(saved);
                        setIsLoggedIn(true);
                        setCurrentUserProfile(profile);
                    }
                });
                return () => unsubscribe();
            }, [fbReady]);

            useEffect(() => {
                if (!user || !fbReady) return;
                const { db, appId, collection, onSnapshot } = window.firebaseUtils;
                
                const entriesRef = collection(db, 'artifacts', appId, 'public', 'data', 'overtime_entries');
                const unsub = onSnapshot(entriesRef, (snapshot) => {
                    if (snapshot.empty) {
                        setDataStatus("Database Kosong");
                        setEntries([]);
                    } else {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setEntries(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
                        setDataStatus("Sinkron (" + data.length + " data)");
                    }
                }, (err) => {
                    setDataStatus("Eror Database");
                });
                return () => unsub();
            }, [user, fbReady]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const found = HARDCODED_USERS.find(u => u.name.toLowerCase() === loginData.name.toLowerCase());
                if (found && found.password === loginData.password) {
                    setIsLoggedIn(true);
                    setCurrentUserProfile(found);
                    sessionStorage.setItem('lembur_user', JSON.stringify(found));
                    notify(`Selamat datang, ${found.name}`);
                } else {
                    notify("Kata sandi salah!", "error");
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUserProfile(null);
                sessionStorage.removeItem('lembur_user');
            };

            const isSupervisor = currentUserProfile?.role === 'supervisor';
            
            const displayedEntries = useMemo(() => {
                if (!isLoggedIn || !currentUserProfile) return [];
                if (isSupervisor) return entries; 
                return entries.filter(e => e.technician === currentUserProfile.name);
            }, [isSupervisor, entries, currentUserProfile, isLoggedIn]);

            // Hitung Rekapan Per Teknisi
            const technicianRecap = useMemo(() => {
                const technicians = HARDCODED_USERS.filter(u => u.role === 'technician');
                return technicians.map(t => {
                    const techEntries = entries.filter(e => e.technician === t.name);
                    const hours = techEntries.reduce((acc, curr) => acc + (Number(curr.duration) || 0), 0);
                    const draftCount = techEntries.filter(e => (e.status || 'Draft') === 'Draft').length;
                    return { name: t.name, totalHours: hours, count: techEntries.length, draftCount };
                });
            }, [entries]);

            // Hitung Rekapan Bulanan
            const monthlyRecap = useMemo(() => {
                const groups = {};
                displayedEntries.forEach(entry => {
                    const date = new Date(entry.date);
                    const monthKey = date.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                    if (!groups[monthKey]) groups[monthKey] = 0;
                    groups[monthKey] += Number(entry.duration) || 0;
                });
                return Object.entries(groups).map(([month, hours]) => ({ month, hours }));
            }, [displayedEntries]);

            const totalHours = displayedEntries.reduce((acc, curr) => acc + (Number(curr.duration) || 0), 0);
            const totalDays = new Set(displayedEntries.map(e => e.date)).size;

            const updateStatus = async (id, newStatus) => {
                try {
                    const { db, appId, updateDoc, doc } = window.firebaseUtils;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'overtime_entries', id), { 
                        status: newStatus 
                    });
                    notify(newStatus === 'Diajukan' ? "Berhasil diajukan!" : "Status diperbarui");
                } catch(e) {
                    notify("Gagal memperbarui status", "error");
                }
            };

            const deleteEntry = async (id) => {
                if(confirm("Hapus data dari cloud Medion?")) { 
                    try {
                        const { db, appId, deleteDoc, doc } = window.firebaseUtils; 
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'overtime_entries', id)); 
                        notify("Data telah dihapus", "info"); 
                    } catch(e) { notify("Gagal menghapus", "error"); }
                }
            };

            if (fbError) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-red-50 text-slate-900">
                    <div className="bg-white p-8 rounded-3xl shadow-xl max-w-sm text-center border-t-8 border-red-500">
                        <Icon name="alert-triangle" className="text-red-500 w-12 h-12 mx-auto mb-4" />
                        <h2 className="text-xl font-black mb-2 text-slate-800">Terjadi Kendala</h2>
                        <p className="text-slate-500 text-sm">{fbError}</p>
                    </div>
                </div>
            );

            if (!isLoggedIn) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-slate-900">
                    <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 animate-in zoom-in-95 duration-300">
                        <div className="text-center mb-10">
                            <div className="medion-gradient w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-500/30">
                                <Icon name="shield-check" className="text-white w-10 h-10" />
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tight italic leading-none">MAINTENANCE LAT</h1>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-3">Monitoring Overtime</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 ml-1 leading-none">Pilih Akun</label>
                                <select className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-600 appearance-none shadow-inner" value={loginData.name} onChange={e => setLoginData({...loginData, name: e.target.value})} required>
                                    <option value="">-- Nama Anjeun --</option>
                                    {HARDCODED_USERS.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 ml-1 leading-none">Password</label>
                                <input type="password" placeholder="••••••••" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-600 shadow-inner" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} required />
                            </div>
                            <button type="submit" className="w-full medion-gradient text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs">Masuk Sistem</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-20 font-sans">
                    <header className="medion-gradient p-4 text-white shadow-lg sticky top-0 z-20 flex justify-between items-center h-16">
                        <div className="flex items-center gap-2 font-black italic uppercase text-white tracking-tighter">
                            <div className="bg-white/20 p-1.5 rounded-lg"><Icon name="clock" className="w-5 h-5 text-white" /></div>
                            Medion Overtime
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowForm(true)} className="bg-white text-blue-700 px-5 py-2 rounded-full font-black text-[10px] uppercase shadow-md active:scale-90 transition-all">Input Baru</button>
                            <button onClick={handleLogout} className="p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors"><Icon name="log-out" className="w-5 h-5 text-white" /></button>
                        </div>
                    </header>
                    
                    <div className="bg-blue-50 px-4 py-2 text-[9px] font-black text-blue-400 uppercase tracking-widest text-center border-b border-blue-100 flex items-center justify-center gap-2">
                        <div className="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></div>
                        Status Cloud: {dataStatus}
                    </div>

                    <main className="max-w-4xl mx-auto p-4 lg:p-8 animate-in fade-in duration-500">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <div>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-2">Halo, Selamat Bekerja</p>
                                <h2 className="text-3xl font-black text-slate-800 tracking-tight flex items-center gap-2 leading-none">
                                    {currentUserProfile.name}
                                    {isSupervisor && <Icon name="shield-check" className="text-blue-600 w-6 h-6" />}
                                </h2>
                            </div>
                            <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-200 w-full md:w-auto">
                                <button onClick={() => setView('dashboard')} className={`flex-1 md:flex-none px-6 py-2.5 rounded-xl text-[10px] font-black transition-all ${view === 'dashboard' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' : 'text-slate-400 hover:text-slate-600'}`}>DASHBOARD</button>
                                <button onClick={() => setView('list')} className={`flex-1 md:flex-none px-6 py-2.5 rounded-xl text-[10px] font-black transition-all ${view === 'list' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' : 'text-slate-400 hover:text-slate-600'}`}>RIWAYAT</button>
                            </div>
                        </div>

                        {view === 'dashboard' ? (
                            <div className="space-y-8">
                                {/* Ringkasan Utama */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden group">
                                        <div className="absolute -top-4 -right-4 p-8 opacity-5 text-blue-600 group-hover:scale-110 transition-transform duration-500"><Icon name="clock" className="w-32 h-32" /></div>
                                        <span className="text-[10px] font-black text-slate-300 uppercase block mb-2 tracking-widest leading-none">{isSupervisor ? 'TOTAL JAM TIM' : 'TOTAL JAM SAYA'}</span>
                                        <p className="text-6xl font-black text-slate-800 tracking-tighter leading-none">{totalHours.toFixed(1)} <span className="text-lg font-medium text-slate-300 italic tracking-normal">Jam</span></p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden group text-slate-900">
                                        <div className="absolute -top-4 -right-4 p-8 opacity-5 text-emerald-600 group-hover:scale-110 transition-transform duration-500"><Icon name="calendar" className="w-32 h-32" /></div>
                                        <span className="text-[10px] font-black text-slate-300 uppercase block mb-2 tracking-widest leading-none">TOTAL HARI</span>
                                        <p className="text-6xl font-black text-slate-800 tracking-tighter leading-none">{totalDays} <span className="text-lg font-medium text-slate-300 italic tracking-normal">Hari</span></p>
                                    </div>
                                </div>

                                {/* Bagian Rekapan Per Teknisi (Hanya Supervisor) */}
                                {isSupervisor && (
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-2 mb-2 ml-1 leading-none">
                                            <Icon name="users" className="text-blue-600 w-4 h-4" />
                                            <h3 className="font-black text-xs uppercase tracking-widest text-slate-400">Monitoring Per Teknisi</h3>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                            {technicianRecap.map(t => (
                                                <div key={t.name} className="bg-slate-900 p-6 rounded-[2rem] text-white shadow-xl shadow-slate-200 relative overflow-hidden group">
                                                    <div className="absolute -bottom-4 -right-4 w-20 h-20 bg-blue-600/20 rounded-full blur-2xl"></div>
                                                    <div className="flex justify-between items-start mb-1">
                                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest">{t.name}</p>
                                                        {t.draftCount > 0 && <span className="bg-amber-500 text-white text-[7px] px-1.5 py-0.5 rounded font-black animate-pulse leading-none">{t.draftCount} DRAFT</span>}
                                                    </div>
                                                    <div className="flex justify-between items-end">
                                                        <p className="text-3xl font-black leading-none">{t.totalHours.toFixed(1)} <span className="text-xs font-normal opacity-40">Jam</span></p>
                                                        <span className="text-[10px] font-bold opacity-40 leading-none">{t.count} Data</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Fitur Rekapan Bulanan */}
                                <div className="space-y-4">
                                    <div className="flex items-center gap-2 mb-2 ml-1 leading-none">
                                        <Icon name="calendar-days" className="text-blue-600 w-4 h-4" />
                                        <h3 className="font-black text-xs uppercase tracking-widest text-slate-400">Rekapan Bulanan</h3>
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                        {monthlyRecap.length === 0 ? (
                                            <div className="p-10 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest italic opacity-50">Belum ada data bulanan</div>
                                        ) : (
                                            <div className="grid grid-cols-1 md:grid-cols-2 divide-x divide-y divide-slate-50">
                                                {monthlyRecap.map(item => (
                                                    <div key={item.month} className="p-6 flex items-center justify-between hover:bg-slate-50/50 transition-all">
                                                        <div className="flex items-center gap-3">
                                                            <div className="p-2 bg-slate-50 rounded-xl text-slate-400"><Icon name="calendar" className="w-5 h-5" /></div>
                                                            <p className="font-black text-slate-700 text-sm tracking-tight">{item.month}</p>
                                                        </div>
                                                        <p className="text-2xl font-black text-blue-600 tracking-tighter">{item.hours.toFixed(1)} <span className="text-xs font-normal text-slate-300">Jam</span></p>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Aktivitas Terakhir */}
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden text-slate-900">
                                    <div className="p-6 border-b border-slate-50 bg-slate-50/50 text-[10px] font-black uppercase text-slate-400 flex items-center justify-between tracking-[0.2em]">
                                        <div className="flex items-center gap-3 leading-none"><Icon name="list" className="w-4 h-4 text-blue-600" /> AKTIVITAS TERBARU</div>
                                        <span className="text-[8px] opacity-60 italic leading-none">{dataStatus}</span>
                                    </div>
                                    <div className="divide-y divide-slate-50 text-slate-900">
                                        {displayedEntries.length === 0 ? (
                                            <div className="p-20 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest italic opacity-50">Belum ada aktivitas tercatat</div>
                                        ) : (
                                            displayedEntries.slice(0, 8).map(entry => (
                                                <div key={entry.id} className="p-6 flex items-center justify-between hover:bg-slate-50/50 transition-all group text-slate-900">
                                                    <div className="flex gap-5 items-center min-w-0">
                                                        <div className="bg-blue-50 w-14 h-14 rounded-2xl flex flex-col items-center justify-center text-blue-600 shrink-0 border border-blue-100 shadow-sm">
                                                            <span className="text-xl font-black leading-none">{new Date(entry.date).getDate()}</span>
                                                            <span className="text-[8px] font-black uppercase leading-none mt-1">{new Date(entry.date).toLocaleString('id-ID', { month: 'short' })}</span>
                                                        </div>
                                                        <div className="min-w-0">
                                                            <div className="flex items-center gap-2 mb-1 flex-wrap text-slate-900">
                                                                {isSupervisor && <span className="text-[8px] bg-slate-900 text-white px-2 py-0.5 rounded-full font-black uppercase tracking-tight leading-none">{entry.technician}</span>}
                                                                <p className="font-black text-slate-800 text-sm tracking-tight truncate leading-tight">{entry.activity}</p>
                                                                <span className={`text-[7px] px-2 py-1 rounded-full font-black uppercase shadow-sm flex items-center gap-1 ${entry.status === 'Diajukan' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-slate-100 text-slate-400 border border-slate-200'}`}>
                                                                    {(entry.status || 'Draft') === 'Diajukan' && <Icon name="check-circle" className="w-2 h-2" />}
                                                                    {entry.status || 'Draft'}
                                                                </span>
                                                            </div>
                                                            <p className="text-[11px] text-slate-400 font-medium italic leading-none">{entry.startTime} - {entry.endTime} ({entry.duration} jam)</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2 shrink-0 ml-4">
                                                        {isSupervisor && (entry.status || 'Draft') === 'Draft' && (
                                                            <button 
                                                                onClick={() => updateStatus(entry.id, 'Diajukan')}
                                                                className="bg-emerald-500 text-white p-2.5 rounded-xl shadow-lg shadow-emerald-500/20 active:scale-90 transition-all flex items-center justify-center"
                                                                title="Ajukan Lembur"
                                                            >
                                                                <Icon name="send" className="w-4 h-4 text-white" />
                                                            </button>
                                                        )}
                                                        <button onClick={() => deleteEntry(entry.id)} className="text-slate-200 hover:text-red-500 p-2.5 transition-colors active:scale-90"><Icon name="trash-2" className="w-5 h-5" /></button>
                                                    </div>
                                                </div>
                                            )
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden text-slate-900 animate-in fade-in duration-500">
                                <div className="p-7 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center text-slate-900">
                                    <h2 className="font-black text-slate-800 text-[10px] uppercase tracking-[0.2em] italic">RIWAYAT LENGKAP</h2>
                                    <span className="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full font-black text-[9px] uppercase tracking-tighter border border-blue-100 leading-none">{displayedEntries.length} RIWAYAT</span>
                                </div>
                                <div className="overflow-x-auto text-slate-900">
                                    <table className="w-full text-left min-w-[650px]">
                                        <thead className="bg-slate-50/50 text-slate-400 text-[9px] font-black uppercase tracking-widest border-b border-slate-50 text-slate-900">
                                            <tr>
                                                <th className="px-8 py-5">Tanggal</th>
                                                {isSupervisor && <th className="px-8 py-5">Teknisi</th>}
                                                <th className="px-8 py-5">Pekerjaan</th>
                                                <th className="px-8 py-5 text-center">Durasi</th>
                                                <th className="px-8 py-5 text-center">Status</th>
                                                <th className="px-8 py-5 w-24 text-right"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50 text-slate-900">
                                            {displayedEntries.map(entry => (
                                                <tr key={entry.id} className="hover:bg-slate-50 transition-all text-slate-900 group">
                                                    <td className="px-8 py-5 font-bold text-slate-700 whitespace-nowrap">{new Date(entry.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                                                    {isSupervisor && <td className="px-8 py-5 text-[10px] font-black text-blue-600 uppercase whitespace-nowrap">{entry.technician}</td>}
                                                    <td className="px-8 py-5 text-slate-500 italic max-w-[200px] truncate leading-tight">{entry.activity}</td>
                                                    <td className="px-8 py-5 text-center font-black text-slate-900">{entry.duration}h</td>
                                                    <td className="px-8 py-5 text-center">
                                                        <span className={`text-[8px] px-2 py-1 rounded-full font-black uppercase tracking-tight ${entry.status === 'Diajukan' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-slate-100 text-slate-400 border border-slate-200'}`}>
                                                            {entry.status || 'Draft'}
                                                        </span>
                                                    </td>
                                                    <td className="px-8 py-5 text-right whitespace-nowrap">
                                                        <div className="flex justify-end gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-all">
                                                            {isSupervisor && (entry.status || 'Draft') === 'Draft' && (
                                                                <button onClick={() => updateStatus(entry.id, 'Diajukan')} className="text-emerald-500 hover:scale-110"><Icon name="send" className="w-4 h-4" /></button>
                                                            )}
                                                            <button onClick={() => deleteEntry(entry.id)} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {showForm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 text-slate-900 leading-none">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100 animate-in zoom-in-95 duration-200 text-slate-900">
                                <div className="medion-gradient p-8 text-white relative leading-none">
                                    <div className="flex justify-between items-start text-white leading-none">
                                        <div>
                                            <h3 className="text-xl font-black tracking-tight italic uppercase text-white leading-none">Input Lembur</h3>
                                            <p className="text-blue-100 text-[10px] font-bold uppercase tracking-widest mt-2 opacity-80 text-white leading-none">Maintenance Technician</p>
                                        </div>
                                        <button onClick={() => setShowForm(false)} className="active:scale-90 text-white opacity-60 hover:opacity-100"><Icon name="x" className="w-7 h-7 text-white" /></button>
                                    </div>
                                </div>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const { db, appId, collection, addDoc } = window.firebaseUtils;
                                    const techName = isSupervisor ? formData.technician : currentUserProfile.name;
                                    if (!techName) { notify("Pilih teknisi!", "error"); return; }
                                    
                                    const st = new Date(`2000-01-01T${formData.startTime}`);
                                    const et = new Date(`2000-01-01T${formData.endTime}`);
                                    let diff = (et - st) / (1000 * 60 * 60);
                                    if (diff < 0) diff += 24;
                                    const duration = parseFloat(diff.toFixed(2));
                                    
                                    try {
                                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'overtime_entries'), { 
                                            ...formData, 
                                            technician: techName, 
                                            duration, 
                                            status: 'Draft',
                                            createdAt: new Date().toISOString() 
                                        });
                                        setShowForm(false);
                                        notify("Berhasil disimpan");
                                        setFormData(prev => ({...prev, startTime: '', endTime: '', activity: ''}));
                                    } catch(e) { notify("Eror simpan!", "error"); }
                                }} className="p-8 space-y-6 text-slate-900 leading-none">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1 leading-none">Tanggal</label>
                                            <input type="date" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-600 shadow-sm" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1 leading-none">Teknisi</label>
                                            {isSupervisor ? (
                                                <select className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-600 appearance-none shadow-sm" value={formData.technician} onChange={e => setFormData({...formData, technician: e.target.value})} required>
                                                    <option value="">-- Pilih --</option>
                                                    {HARDCODED_USERS.filter(u => u.role === 'technician').map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                                </select>
                                            ) : <input type="text" readOnly className="w-full p-4 bg-slate-100 border border-slate-200 rounded-2xl text-xs font-black text-slate-400 outline-none shadow-inner" value={currentUserProfile?.name} />}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1 leading-none">Mulai</label><input type="time" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-600 shadow-sm" value={formData.startTime} onChange={e => setFormData({...formData, startTime: e.target.value})} required /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1 leading-none">Selesai</label><input type="time" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-600 shadow-sm" value={formData.endTime} onChange={e => setFormData({...formData, endTime: e.target.value})} required /></div>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1.5 ml-1 leading-none">Pekerjaan</label><textarea placeholder="Tugas apa yang dikerjakan?" rows="3" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold resize-none outline-none focus:ring-2 focus:ring-blue-600 shadow-sm" value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} required /></div>
                                    <button type="submit" className="w-full medion-gradient text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-500/20 active:scale-95 transition-all text-white uppercase text-xs tracking-[0.2em] leading-none">Simpan Lembur</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[60] bg-slate-900 text-white px-8 py-4 rounded-full font-black text-[10px] uppercase tracking-widest shadow-2xl animate-in slide-in-from-bottom-8 duration-300">
                            <div className="flex items-center gap-2">
                                <div className={`w-1.5 h-1.5 rounded-full ${notification.type === 'error' ? 'bg-red-500' : notification.type === 'info' ? 'bg-slate-400' : 'bg-emerald-400'} animate-pulse`}></div>
                                {notification.msg}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
