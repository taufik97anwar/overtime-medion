<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Medion - Sistem Pencatatan Lembur</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <!-- Tampilan Loading Awal -->
        <div style="display: flex; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;">
            <div class="spinner"></div>
            <p style="font-weight: 800; color: #64748b; font-size: 0.875rem;">MEMUAT OVERTIME MEDION...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE ---
        // PENTING: Ganti nilai di bawah ini dengan data asli dari Firebase Bapak!
        const firebaseConfig = {
  apiKey: "AIzaSyCqhhhn016DjYqZklNK5AhkhN7HTBlGIlg",
  authDomain: "monitoring-order.firebaseapp.com",
  projectId: "monitoring-order",
  storageBucket: "monitoring-order.firebasestorage.app",
  messagingSenderId: "966390784471",
  appId: "1:966390784471:web:58093b205a9fe235392b92",
  measurementId: "G-2VVXTPLQ7Q"
};

        try {
            const appId = 'overtime-medion';
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            // Simpan ke window agar React bisa baca
            window.firebaseDB = db;
            window.firebaseAuth = auth;
            window.firebaseAppId = appId;
            window.firestoreUtils = { collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, signInAnonymously, onAuthStateChanged };
            
            console.log("Firebase berhasil diinisialisasi");
        } catch (e) {
            console.error("Gagal inisialisasi Firebase:", e);
            window.firebaseError = e.message;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Komponen Icon Sederhana menggunakan Lucide
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);

            // Tunggu Firebase Script Selesai
            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.firebaseDB && window.firebaseAuth) {
                        setIsReady(true);
                        clearInterval(checkFirebase);
                    } else if (window.firebaseError) {
                        setErrorMsg(window.firebaseError);
                        clearInterval(checkFirebase);
                    }
                }, 500);
                return () => clearInterval(checkFirebase);
            }, []);

            const [user, setUser] = useState(null); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUserProfile, setCurrentUserProfile] = useState(null); 
            const [loading, setLoading] = useState(true);
            const [usersList, setUsersList] = useState([]);
            const [entries, setEntries] = useState([]);
            const [view, setView] = useState('dashboard'); 
            const [showForm, setShowForm] = useState(false);
            const [notification, setNotification] = useState(null);
            const [loginData, setLoginData] = useState({ name: '', password: '' });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                technician: '',
                startTime: '',
                endTime: '',
                activity: ''
            });

            const { collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, signInAnonymously, onAuthStateChanged } = window.firestoreUtils || {};

            useEffect(() => {
                if (!isReady) return;
                const initAuth = async () => {
                    try { await signInAnonymously(window.firebaseAuth); } catch (err) { console.error(err); }
                    finally { setLoading(false); }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(window.firebaseAuth, (firebaseUser) => {
                    setUser(firebaseUser);
                    const savedProfile = sessionStorage.getItem('lembur_user');
                    if (savedProfile) {
                        const profile = JSON.parse(savedProfile);
                        setIsLoggedIn(true);
                        setCurrentUserProfile(profile);
                    }
                });
                return () => unsubscribe();
            }, [isReady]);

            useEffect(() => {
                if (!user || !isReady) return;
                const appId = window.firebaseAppId;
                const db = window.firebaseDB;

                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const entriesRef = collection(db, 'artifacts', appId, 'public', 'data', 'overtime_entries');

                const unsubUsers = onSnapshot(usersRef, (snapshot) => {
                    const uList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setUsersList(uList);
                });

                const unsubEntries = onSnapshot(entriesRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
                });

                return () => { unsubUsers(); unsubEntries(); };
            }, [user, isReady]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const foundUser = usersList.find(u => u.name === loginData.name);
                if (foundUser && foundUser.password === loginData.password) {
                    setIsLoggedIn(true);
                    setCurrentUserProfile(foundUser);
                    sessionStorage.setItem('lembur_user', JSON.stringify(foundUser));
                    notify(`Halo, ${foundUser.name}!`);
                } else {
                    notify("Sandi salah!", "error");
                }
            };

            const isSupervisor = currentUserProfile?.role === 'supervisor';
            const displayedEntries = useMemo(() => isSupervisor ? entries : entries.filter(e => e.technician === currentUserProfile?.name), [isSupervisor, entries, currentUserProfile]);
            const totalHours = displayedEntries.reduce((acc, curr) => acc + curr.duration, 0);

            if (errorMsg) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-red-50">
                        <div className="bg-white p-8 rounded-[2rem] shadow-xl max-w-sm text-center border border-red-100">
                            <div className="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-circle" className="text-red-600 w-8 h-8" /></div>
                            <h2 className="text-xl font-black text-slate-800 mb-2 tracking-tight">Koneksi Gagal</h2>
                            <p className="text-slate-500 text-sm mb-4">Pastikan Config Firebase di koding Bapak sudah benar.</p>
                            <div className="bg-slate-100 p-3 rounded-xl text-[10px] font-mono text-red-500 break-all">{errorMsg}</div>
                        </div>
                    </div>
                );
            }

            if (!isReady || loading) return (
                <div className="min-h-screen flex items-center justify-center flex-col gap-4">
                    <div className="spinner"></div>
                    <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Sinkronisasi Cloud...</p>
                </div>
            );

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-8">
                            <div className="text-center mb-8">
                                <div className="bg-blue-600 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-500/20"><Icon name="clock" className="text-white w-8 h-8" /></div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight italic">Overtime Medion</h1>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1 opacity-60">Sistem Cloud Database</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <select className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none appearance-none" value={loginData.name} onChange={e => setLoginData({...loginData, name: e.target.value})}>
                                    <option value="">-- Pilih Nama --</option>
                                    {usersList.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}
                                </select>
                                <input type="password" placeholder="Kata Sandi" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} />
                                <button type="submit" className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-500/20 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs">MASUK</button>
                            </form>
                            {usersList.length === 0 && <p className="mt-6 text-[10px] text-center text-blue-600 font-bold animate-pulse italic">Menunggu database user... Pastikan Firestore terisi.</p>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-20 font-sans">
                    <header className="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-20 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-black italic uppercase"><Icon name="clock" className="w-5 h-5 text-white" /> Medion</div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowForm(true)} className="bg-white text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase shadow-sm">Catat</button>
                            <button onClick={() => { setIsLoggedIn(false); sessionStorage.removeItem('lembur_user'); }} className="p-1.5 hover:bg-white/10 rounded-full"><Icon name="log-out" className="w-5 h-5 text-white" /></button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4">
                        <div className="flex justify-between items-center mb-8">
                            <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Halo,</p><h2 className="text-3xl font-black text-slate-800 tracking-tight">{currentUserProfile.name}</h2></div>
                            <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                                <button onClick={() => setView('dashboard')} className={`px-4 py-2 rounded-lg text-[10px] font-black ${view === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>DASHBOARD</button>
                                <button onClick={() => setView('list')} className={`px-4 py-2 rounded-lg text-[10px] font-black ${view === 'list' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>RIWAYAT</button>
                            </div>
                        </div>

                        {view === 'dashboard' ? (
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-slate-900"><span className="text-[9px] font-black text-slate-300 uppercase block mb-1">Total Jam</span><p className="text-4xl font-black">{totalHours}h</p></div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-slate-900"><span className="text-[9px] font-black text-slate-300 uppercase block mb-1">Aktivitas</span><p className="text-4xl font-black">{displayedEntries.length}</p></div>
                                </div>
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden text-slate-900">
                                    <div className="p-4 border-b border-slate-50 bg-slate-50/50 text-[9px] font-black uppercase text-slate-400 flex items-center gap-2"><Icon name="list" className="w-3 h-3" /> Data Cloud Terbaru</div>
                                    <div className="divide-y divide-slate-50">
                                        {displayedEntries.slice(0, 5).map(entry => (
                                            <div key={entry.id} className="p-4 flex items-center justify-between">
                                                <div className="flex gap-3 items-center">
                                                    <div className="bg-slate-100 w-10 h-10 rounded-xl flex flex-col items-center justify-center text-slate-500 shrink-0"><span className="text-[8px] font-black">{new Date(entry.date).getDate()}</span><span className="text-[8px] font-black uppercase">{new Date(entry.date).toLocaleString('id-ID', { month: 'short' })}</span></div>
                                                    <div><p className="font-black text-slate-800 text-xs">{entry.activity}</p><p className="text-[9px] text-slate-400">{entry.technician} | {entry.duration} jam</p></div>
                                                </div>
                                                <span className={`text-[7px] px-2 py-1 rounded-full font-black uppercase ${entry.status === 'Diajukan' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>{entry.status}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden text-slate-900">
                                <table className="w-full text-left text-xs">
                                    <thead className="bg-slate-50 text-slate-400 text-[8px] font-black uppercase tracking-widest"><tr><th className="px-6 py-4">Tanggal</th><th className="px-6 py-4">Pekerjaan</th><th className="px-6 py-4 text-center">Durasi</th></tr></thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {displayedEntries.map(entry => (
                                            <tr key={entry.id}><td className="px-6 py-4 font-bold">{new Date(entry.date).toLocaleDateString('id-ID')}</td><td className="px-6 py-4">{entry.activity}</td><td className="px-6 py-4 text-center font-black">{entry.duration}h</td></tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {showForm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 text-slate-900">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
                                <h3 className="text-lg font-black mb-6 uppercase tracking-tight">Catat Lembur</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const techName = isSupervisor ? formData.technician : currentUserProfile.name;
                                    const st = new Date(`2000-01-01T${formData.startTime}`);
                                    const et = new Date(`2000-01-01T${formData.endTime}`);
                                    let diff = (et - st) / (1000 * 60 * 60);
                                    if (diff < 0) diff += 24;
                                    const duration = parseFloat(diff.toFixed(2));
                                    
                                    await addDoc(collection(window.firebaseDB, 'artifacts', window.firebaseAppId, 'public', 'data', 'overtime_entries'), { ...formData, technician: techName, duration, status: 'Draft', createdAt: new Date().toISOString() });
                                    setShowForm(false);
                                    notify("Data tersimpan!");
                                }} className="space-y-4">
                                    <input type="date" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} required />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="time" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold" value={formData.startTime} onChange={e => setFormData({...formData, startTime: e.target.value})} required />
                                        <input type="time" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold" value={formData.endTime} onChange={e => setFormData({...formData, endTime: e.target.value})} required />
                                    </div>
                                    <textarea placeholder="Pekerjaan..." className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold resize-none" rows="3" value={formData.activity} onChange={e => setFormData({...formData, activity: e.target.value})} required />
                                    <button type="submit" className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-[10px] tracking-widest">Kirim Ke Cloud</button>
                                    <button type="button" onClick={() => setShowForm(false)} className="w-full text-slate-400 font-bold text-[10px] uppercase">Batal</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] bg-slate-900 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase tracking-widest shadow-2xl">{notification.msg}</div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
