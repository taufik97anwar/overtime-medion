<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Medion - Sistem Pencatatan Lembur</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE ---
        // Ganti data di bawah ini dengan config dari Firebase Console Bapak
        const firebaseConfig = {
  apiKey: "AIzaSyCqhhhn016DjYqZklNK5AhkhN7HTBlGIlg",
  authDomain: "monitoring-order.firebaseapp.com",
  projectId: "monitoring-order",
  storageBucket: "monitoring-order.firebasestorage.app",
  messagingSenderId: "966390784471",
  appId: "1:966390784471:web:58093b205a9fe235392b92",
  measurementId: "G-2VVXTPLQ7Q"
};

        const appId = 'overtime-medion';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Ekspos ke window agar bisa diakses oleh Babel script
        window.firebaseUtils = { auth, db, appId, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, signInAnonymously, onAuthStateChanged };
    </script>

    <!-- React App Script -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Plus, Trash2, Clock, Calendar, FileText, LayoutDashboard, 
            List, AlertCircle, CheckCircle2, User, LogOut, Lock, 
            ChevronRight, ShieldCheck, Users, Send, CheckCircle, Loader2 
        } = lucideReact;

        const App = () => {
            const { auth, db, appId, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, signInAnonymously, onAuthStateChanged } = window.firebaseUtils;

            const [user, setUser] = useState(null); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUserProfile, setCurrentUserProfile] = useState(null); 
            const [loading, setLoading] = useState(true);
            const [usersList, setUsersList] = useState([]);
            const [entries, setEntries] = useState([]);
            const [view, setView] = useState('dashboard'); 
            const [showForm, setShowForm] = useState(false);
            const [notification, setNotification] = useState(null);
            const [loginData, setLoginData] = useState({ name: '', password: '' });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                technician: '',
                startTime: '',
                endTime: '',
                activity: ''
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Auth error:", err);
                    } finally {
                        setLoading(false);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
                    setUser(firebaseUser);
                    const savedProfile = sessionStorage.getItem('lembur_user');
                    if (savedProfile) {
                        const profile = JSON.parse(savedProfile);
                        setIsLoggedIn(true);
                        setCurrentUserProfile(profile);
                        setFormData(prev => ({ ...prev, technician: profile.role === 'supervisor' ? '' : profile.name }));
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const entriesRef = collection(db, 'artifacts', appId, 'public', 'data', 'overtime_entries');

                const unsubUsers = onSnapshot(usersRef, (snapshot) => {
                    const uList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setUsersList(uList);
                    if (uList.length > 0 && !loginData.name) {
                        setLoginData(prev => ({ ...prev, name: uList[0].name }));
                    }
                });

                const unsubEntries = onSnapshot(entriesRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
                });

                return () => { unsubUsers(); unsubEntries(); };
            }, [user]);

            const notify = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const foundUser = usersList.find(u => u.name === loginData.name);
                if (foundUser && foundUser.password === loginData.password) {
                    setIsLoggedIn(true);
                    setCurrentUserProfile(foundUser);
                    setFormData(prev => ({ ...prev, technician: foundUser.role === 'supervisor' ? '' : foundUser.name }));
                    sessionStorage.setItem('lembur_user', JSON.stringify(foundUser));
                    notify(`Selamat datang, ${foundUser.name}!`);
                } else {
                    notify("Nama atau kata sandi salah!", "error");
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUserProfile(null);
                sessionStorage.removeItem('lembur_user');
                notify("Berhasil keluar", "info");
            };

            const calculateDuration = (start, end) => {
                if (!start || !end) return 0;
                const startTime = new Date(`2000-01-01T${start}`);
                const endTime = new Date(`2000-01-01T${end}`);
                let diff = (endTime - startTime) / (1000 * 60 * 60);
                if (diff < 0) diff += 24;
                return parseFloat(diff.toFixed(2));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.startTime || !formData.endTime || !formData.activity || !formData.technician) {
                    notify("Mohon lengkapi semua data", "error");
                    return;
                }
                try {
                    const duration = calculateDuration(formData.startTime, formData.endTime);
                    const newEntry = { ...formData, duration, status: 'Draft', createdAt: new Date().toISOString(), createdBy: user.uid };
                    const entriesRef = collection(db, 'artifacts', appId, 'public', 'data', 'overtime_entries');
                    await addDoc(entriesRef, newEntry);
                    setShowForm(false);
                    setFormData(prev => ({ ...prev, startTime: '', endTime: '', activity: '' }));
                    notify(`Data lembur ${newEntry.technician} tersimpan`);
                } catch (err) { notify("Gagal menyimpan data", "error"); }
            };

            const deleteEntry = async (id) => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'overtime_entries', id));
                    notify("Catatan dihapus", "info");
                } catch (err) { notify("Gagal menghapus", "error"); }
            };

            const submitToHR = async (id) => {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'overtime_entries', id), { status: 'Diajukan' });
                    notify("Lembur telah diajukan");
                } catch (err) { notify("Gagal update status", "error"); }
            };

            const isSupervisor = currentUserProfile?.role === 'supervisor';
            const displayedEntries = isSupervisor ? entries : entries.filter(e => e.technician === currentUserProfile.name);
            const totalHours = displayedEntries.reduce((acc, curr) => acc + curr.duration, 0);
            const totalDays = new Set(displayedEntries.map(e => e.date)).size;
            const techniciansOnly = usersList.filter(u => u.role === 'technician');
            const techStats = techniciansOnly.map(t => ({
                name: t.name,
                hours: entries.filter(e => e.technician === t.name).reduce((acc, curr) => acc + curr.duration, 0),
                pending: entries.filter(e => e.technician === t.name && e.status === 'Draft').length
            }));

            if (loading) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><Loader2 className="w-8 h-8 animate-spin text-blue-600" /></div>;

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">
                            <div className="text-center mb-8">
                                <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white"><Clock className="w-8 h-8" /></div>
                                <h1 className="text-2xl font-black text-slate-800">Overtime Medion</h1>
                                <p className="text-slate-500 text-xs mt-2 uppercase font-bold tracking-widest italic">Cloud Authentication</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <label className="block text-xs font-black text-slate-400 uppercase mb-2">Pilih Akun</label>
                                    <select className="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none" value={loginData.name} onChange={(e) => setLoginData({...loginData, name: e.target.value})}>
                                        <option value="" disabled>Pilih nama...</option>
                                        {usersList.map(u => <option key={u.id} value={u.name}>{u.name} ({u.role === 'supervisor' ? 'Pengawas' : 'Teknisi'})</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-black text-slate-400 uppercase mb-2">Kata Sandi</label>
                                    <input type="password" placeholder="••••••••" className="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2 group">
                                    MASUK KE SISTEM <ChevronRight className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20">
                    <header className="bg-blue-700 text-white shadow-lg sticky top-0 z-20">
                        <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2"><Clock className="w-6 h-6" /><h1 className="font-black text-xl italic uppercase">Medion Overtime</h1></div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setShowForm(true)} className="bg-white text-blue-700 px-5 py-2 rounded-full font-black text-xs uppercase"><Plus className="w-4 h-4 inline mr-1" /> Catat</button>
                                <button onClick={handleLogout} className="p-2 hover:bg-white/10 rounded-full"><LogOut className="w-5 h-5 text-white" /></button>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-4xl mx-auto p-4">
                        <div className="mb-8 flex items-center justify-between">
                            <div>
                                <div className="flex items-center gap-2 mb-1"><p className="text-slate-400 text-[10px] font-black uppercase">User Cloud</p>{isSupervisor && <span className="bg-blue-100 text-blue-700 text-[9px] font-black px-2 py-0.5 rounded-full border border-blue-200">PENGAWAS</span>}</div>
                                <h2 className="text-3xl font-black text-slate-800">{currentUserProfile.name}</h2>
                            </div>
                            <div className="flex gap-1 bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
                                <button onClick={() => setView('dashboard')} className={`px-4 py-2 rounded-xl text-[10px] font-black tracking-widest ${view === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>DASHBOARD</button>
                                <button onClick={() => setView('list')} className={`px-4 py-2 rounded-xl text-[10px] font-black tracking-widest ${view === 'list' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>RIWAYAT</button>
                            </div>
                        </div>
                        {view === 'dashboard' ? (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div className="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm"><span className="text-[10px] font-black text-slate-300 uppercase block mb-4 tracking-widest">{isSupervisor ? 'TOTAL SELURUH TIM' : 'TOTAL JAM ANDA'}</span><p className="text-5xl font-black text-slate-800">{totalHours} <span className="text-xl font-medium text-slate-300 italic">Jam</span></p></div>
                                    <div className="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm"><span className="text-[10px] font-black text-slate-300 uppercase block mb-4 tracking-widest">HARI KERJA LEMBUR</span><p className="text-5xl font-black text-slate-800">{totalDays} <span className="text-xl font-medium text-slate-300 italic">Hari</span></p></div>
                                </div>
                                {isSupervisor && (
                                    <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl">
                                        <div className="flex items-center gap-3 mb-8"><Users className="w-5 h-5 text-blue-500" /><h3 className="font-black text-lg text-white">Monitoring Teknisi</h3></div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            {techStats.map(t => (<div key={t.name} className="bg-white/5 p-5 rounded-2xl border border-white/10"><p className="text-blue-400 text-[10px] font-black uppercase mb-1">{t.name}</p><div className="flex justify-between items-end"><p className="text-3xl font-black text-white">{t.hours} <span className="text-xs font-normal opacity-40">h</span></p>{t.pending > 0 && <span className="bg-amber-500 text-white text-[8px] px-2 py-1 rounded-md animate-pulse">{t.pending} PENDING</span>}</div></div>))}
                                        </div>
                                    </div>
                                )}
                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden text-slate-900">
                                    <div className="p-6 border-b border-slate-50 bg-slate-50/30 text-[10px] font-black uppercase text-slate-400 tracking-widest flex items-center gap-2"><List className="w-4 h-4 text-blue-600" /> Aktivitas Terbaru</div>
                                    <div className="divide-y divide-slate-50">
                                        {displayedEntries.length === 0 ? <div className="p-16 text-center text-slate-300 font-bold">Data Kosong</div> : displayedEntries.slice(0, 8).map(entry => (
                                            <div key={entry.id} className="p-5 flex items-center justify-between hover:bg-slate-50/50">
                                                <div className="flex gap-5 items-center min-w-0">
                                                    <div className="bg-slate-50 w-14 h-14 rounded-2xl flex flex-col items-center justify-center text-slate-400 shrink-0 border border-slate-100"><span className="text-[10px] uppercase font-black">{new Date(entry.date).toLocaleString('id-ID', { month: 'short' })}</span><span className="text-xl font-black text-slate-700">{new Date(entry.date).getDate()}</span></div>
                                                    <div className="min-w-0">
                                                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                            {isSupervisor && <span className="text-[9px] bg-blue-50 text-blue-600 px-2 py-1 rounded-lg font-black uppercase">{entry.technician}</span>}
                                                            <p className="font-black text-slate-800 text-sm truncate">{entry.activity}</p>
                                                            <span className={`text-[9px] px-2 py-1 rounded-full font-black uppercase ${entry.status === 'Diajukan' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>{entry.status}</span>
                                                        </div>
                                                        <p className="text-[11px] text-slate-400 font-medium">{entry.startTime} - {entry.endTime} ({entry.duration} jam)</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    {isSupervisor && entry.status === 'Draft' && <button onClick={() => submitToHR(entry.id)} className="bg-emerald-500 text-white p-2.5 rounded-xl"><Send className="w-4 h-4 text-white" /></button>}
                                                    <button onClick={() => deleteEntry(entry.id)} className="text-slate-200 hover:text-red-500 p-2.5"><Trash2 className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-x-auto text-slate-900">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50/50 text-slate-400 text-[10px] font-black uppercase">
                                        <tr><th className="px-8 py-5">Tanggal</th>{isSupervisor && <th className="px-8 py-5">Teknisi</th>}<th className="px-8 py-5">Aktivitas</th><th className="px-8 py-5 text-center">Durasi</th><th className="px-8 py-5 text-center">Status</th><th className="px-8 py-5"></th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {displayedEntries.map(entry => (
                                            <tr key={entry.id} className="hover:bg-slate-50/30">
                                                <td className="px-8 py-5 text-sm font-black">{new Date(entry.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                                                {isSupervisor && <td className="px-8 py-5 text-xs font-black text-blue-600 uppercase">{entry.technician}</td>}
                                                <td className="px-8 py-5 text-sm text-slate-500">{entry.activity}</td>
                                                <td className="px-8 py-5 text-sm text-center font-black">{entry.duration}h</td>
                                                <td className="px-8 py-5 text-center"><span className={`text-[9px] px-3 py-1.5 rounded-full font-black uppercase ${entry.status === 'Diajukan' ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>{entry.status}</span></td>
                                                <td className="px-8 py-5 text-right"><button onClick={() => deleteEntry(entry.id)} className="text-slate-200 hover:text-red-500"><Trash2 className="w-4 h-4 text-slate-200" /></button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {showForm && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100">
                                <div className="bg-blue-700 p-10 text-white relative">
                                    <h3 className="text-2xl font-black text-white">Input Lembur</h3>
                                    <p className="text-blue-100 text-xs mt-2 font-bold uppercase opacity-70 text-white tracking-widest">{isSupervisor ? `Mengisi untuk tim` : `Halo ${currentUserProfile.name}`}</p>
                                    <button onClick={() => setShowForm(false)} className="absolute top-10 right-10 text-white opacity-50 hover:opacity-100"><Plus className="w-6 h-6 rotate-45 text-white" /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-10 space-y-6">
                                    <div className="grid grid-cols-2 gap-5">
                                        <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Tanggal</label><input type="date" className="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold outline-none" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} /></div>
                                        <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Teknisi</label>
                                            {isSupervisor ? (
                                                <select className="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold outline-none" value={formData.technician} onChange={(e) => setFormData({...formData, technician: e.target.value})}>
                                                    <option value="">Pilih...</option>
                                                    {techniciansOnly.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                                </select>
                                            ) : (
                                                <input type="text" readOnly className="w-full px-4 py-4 bg-slate-100 border border-slate-200 rounded-2xl text-sm font-black text-slate-400 outline-none" value={currentUserProfile.name} />
                                            )}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Mulai</label><input type="time" className="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold outline-none" value={formData.startTime} onChange={(e) => setFormData({...formData, startTime: e.target.value})} /></div>
                                        <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Selesai</label><input type="time" className="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold outline-none" value={formData.endTime} onChange={(e) => setFormData({...formData, endTime: e.target.value})} /></div>
                                    </div>
                                    <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Pekerjaan</label><textarea placeholder="Deskripsi..." rows="2" className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold resize-none outline-none" value={formData.activity} onChange={(e) => setFormData({...formData, activity: e.target.value})} /></div>
                                    <div className="pt-4 flex gap-4"><button type="button" onClick={() => setShowForm(false)} className="flex-1 py-5 text-slate-400 font-black text-[10px] uppercase">Batal</button><button type="submit" className="flex-[2] bg-blue-600 text-white font-black py-5 rounded-[1.5rem] text-[10px] uppercase shadow-lg tracking-widest text-white">SIMPAN</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                    {notification && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[60] animate-in slide-in-from-bottom-10"><div className={`px-8 py-4 rounded-full shadow-2xl bg-slate-900 text-white border border-slate-800 flex items-center gap-2`}><div className="w-2 h-2 rounded-full bg-blue-400 animate-pulse"></div><span className="font-black text-[10px] uppercase tracking-widest text-white">{notification.message}</span></div></div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
